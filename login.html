<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Index — Login</title>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="icon" href="favicon.svg" type="image/svg+xml"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>

  <header class="nav fade-in">
    <div class="container nav-inner">
      <div class="logo">
        <a href="index.html">
            <svg class="logo-mark" width="28" height="28" viewBox="0 0 64 64" fill="none">
            <circle cx="32" cy="32" r="16" stroke="#B4CF6A" stroke-width="1.5"/>
            <circle cx="32" cy="32" r="5.5" fill="#B4CF6A"/>
            <line x1="32" y1="8" x2="32" y2="15" stroke="#3A9DF7" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <span>Index.art</span>
        </a>
        </div>

      <nav class="nav-links">
        <a href="explore.html">Explore</a>
        <a href="artists.html">Artists</a>
        <a href="login.html">Login</a>
        <a href="profile-create.html" class="btn-outline">Create Profile</a>
      </nav>
    </div>
  </header>

  <main class="login-wrap">
    <section class="login-panel fade-up">
      <div class="eyebrow">ACCESS</div>
      <h1 class="card-title" style="font-size: 2rem; margin-bottom: 10px;">Enter Index</h1>
      <p class="card-copy" style="margin-bottom: 22px;">
        Sign in to manage your profile, archive works, and prepare pieces for registry.
      </p>

      <form class="form-grid">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="you@example.com" />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Enter your password" />
        </div>

        <button type="submit" class="btn-primary">Login</button>
      </form>

      <div class="link-row">
        <a class="text-link" href="profile-create.html">Create profile</a>
        <a class="text-link" href="#">Forgot password</a>
      </div>
    </section>
  </main>

  <footer class="footer fade-in">
    <div class="container footer-inner">
      <span>© 2026 CourDevelops</span>
      <div>
        <a href="#">About</a>
        <a href="#">Terms</a>
      </div>
    </div>
  </footer>
</body>
</html>
